name: mi_app
description: "Aplicación de lectura desarrollada con Flutter."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  cloud_firestore: ^6.7.1
  firebase_storage: ^13.4.5
  provider: ^6.1.5+1
  flutter_svg: ^2.3.0
  share_plus: ^13.2.1
  image_picker: ^1.2.3
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  url_launcher: ^6.3.2
  firebase_messaging: ^16.4.3
  shared_preferences: ^2.5.5
  image_picker_for_web: ^3.1.1

  http: any
  vibration: ^3.2.0
  flutter_local_notifications: ^22.1.0
  permission_handler: ^12.0.3
  nearby_connections: ^4.3.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  icons_launcher: ^3.1.0
  flutter_launcher_icons: ^0.14.4
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
   